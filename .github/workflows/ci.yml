name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      # The SDK is a git dependency. npm lockfile resolves to ssh://
      # but CI doesn't have SSH keys. Rewrite to HTTPS.
      - run: git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"

      - run: npm ci
      - run: npm run build
      - run: npm test
      - run: npm run lint

      # The plugin loads dist/ directly on /plugin install, so the committed
      # bundle must match the current source. Fail the build if it drifts.
      - name: Check committed dist/ matches source
        run: |
          if ! git diff --quiet --exit-code -- dist/; then
            echo "::error::dist/ is out of date. Run 'npm run build' and commit the result."
            git --no-pager diff --stat -- dist/
            exit 1
          fi
